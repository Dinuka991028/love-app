<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mistress Love Protocol</title>

<style>

body{
margin:0;
background:#08000f;
color:#ff66cc;
font-family:Consolas,monospace;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#app{
width:100%;
max-width:420px;
padding:15px;
}

#terminal{
background:#14001f;
border:1px solid #ff66cc;
box-shadow:0 0 25px #ff1493;
padding:20px;
border-radius:15px;
white-space:pre-wrap;
min-height:300px;
font-size:14px;
}

.question-box{
display:none;
text-align:center;
margin-top:15px;
}


button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:17px;
cursor:pointer;
}


#yesBtn{
background:#ff66cc;
color:white;
box-shadow:0 0 15px #ff66cc;
}


#noBtn{
background:#444;
color:white;
}


.cursor{
display:inline-block;
width:8px;
height:15px;
background:#ff66cc;
animation:blink .7s infinite;
}


@keyframes blink{
50%{opacity:0;}
}


.fall{
position:fixed;
top:-20px;
animation:fall linear forwards;
z-index:999;
}


@keyframes fall{

to{
transform:translateY(110vh);
opacity:0;
}

}


.firework{

position:fixed;
width:8px;
height:8px;
border-radius:50%;
animation:boom 1s forwards;

}


@keyframes boom{

to{
transform:translate(var(--x),var(--y));
opacity:0;
}

}


.shake{
animation:shake .4s;
}


@keyframes shake{

25%{transform:translate(5px);}
50%{transform:translate(-5px);}
75%{transform:translate(5px);}

}


</style>

</head>


<body>


<div id="app">


<audio id="bgMusic" loop>

<!-- Put your romantic song here -->
<source src="romantic-song.mp3" type="audio/mpeg">

</audio>


<audio id="kissSound">

<source src="kiss.mp3" type="audio/mpeg">

</audio>



<div id="terminal"></div>


<div class="question-box">

<button id="yesBtn">
YES Mistress 👑❤️
</button>


<button id="noBtn">
NO 😭
</button>


</div>


</div>



<script>


const text=

`$ java HusbandSubmissionProtocol


Starting Private Love System...


Connecting to Mistress Rashmi 👑❤️


Relationship Mode:

🖤 slave Hubby
👑 Mistress Wife


Loading:

Love ........ OK
Loyalty .... OK
Attention .. OK
Affection .. OK


Hubby Status:

READY FOR HIS MISTRESS 💋


SYSTEM READY.


QUESTION:

Will you keep your slave hubby forever? ❤️`;



let i=0;

const terminal=document.getElementById("terminal");

const box=document.querySelector(".question-box");



function type(){

if(i<text.length){

terminal.innerHTML=text.substring(0,i)+
'<span class="cursor"></span>';

i++;

setTimeout(type,25);

}

else{

terminal.innerHTML=text;

box.style.display="block";

}

}

// VOICE

function loveVoice(){

let msg=new SpeechSynthesisUtterance(
"Rashmi, my beautiful Mistress, your slave hubby loves you forever."
);


msg.rate=.8;

msg.pitch=1.3;

speechSynthesis.speak(msg);

// YES


document.getElementById("yesBtn").onclick=function(){


loveVoice();


let music=document.getElementById("bgMusic");

music.volume=.5;

`👑 MISTRESS ACCEPTED


Welcome Mistress Rashmi ❤️


🖤 Subby Hubby Mode: ACTIVE

👑 Mistress Priority: MAXIMUM

💚 Love: INFINITE

💋 Kiss Rain: ON

🎶 Romantic Feeling: ON

🎆 Forever Mode: ENABLED


Your hubby belongs to your heart ❤️`;

fireworks();

// NO BUTTON ESCAPE


document.getElementById("noBtn").onmouseenter=function(){

this.style.position="absolute";

this.style.left=Math.random()*80+"vw";

this.style.top=Math.random()*80+"vh";


};



// KISS RAIN


function kissRain(){


setInterval(()=>{


let e=document.createElement("div");


e.className="fall";


e.innerHTML=[
"💋",
"❤️",
"👑",
"💕"
][Math.floor(Math.random()*4)];


e.style.left=Math.random()*100+"vw";

e.style.fontSize="25px";

e.style.animationDuration=
(2+Math.random()*3)+"s";


document.body.appendChild(e);


setTimeout(()=>e.remove(),5000);


},250);


}




// FIREWORKS


function fireworks(){


setInterval(()=>{


for(let i=0;i<15;i++){


let f=document.createElement("div");

f.className="firework";


f.style.left="50%";

f.style.top="50%";


let a=Math.random()*6.28;

let r=100+Math.random()*200;


f.style.setProperty("--x",
Math.cos(a)*r+"px");


f.style.setProperty("--y",
Math.sin(a)*r+"px");


document.body.appendChild(f);


setTimeout(()=>f.remove(),1000);


}


},800);


}



</script>


</body>
</html>
